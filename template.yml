AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  # 1. ల్యాంబ్డా ఫంక్షన్ డెఫినిషన్
  MyLocalFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      MemorySize: 512
      Timeout: 300
      CodeUri: mylambda/
      
      Environment:
        Variables:
          TABLE_NAME: !Ref MyChatHistoryTable
          SOURCE_BUCKET: "harinathdocs" # మీ బకెట్ పేరు ఇక్కడ నేరుగా ఇచ్చాను

      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - "bedrock:InvokeModel"
                - "bedrock:InvokeModelWithResponseStream"
                -  "aws-marketplace:ViewSubscriptions"
                -  "aws-marketplace:Subscribe"
              Resource: "*"
            - Effect: Allow
              Action:
                - "dynamodb:PutItem"
                - "dynamodb:GetItem"
                - "dynamodb:Query"
                - "dynamodb:UpdateItem"
              Resource: !GetAtt MyChatHistoryTable.Arn
            # మ్యాన్యువల్ బకెట్ 'harinathdocs' నుండి డేటా చదవడానికి పర్మిషన్
            - Effect: Allow
              Action:
                - "s3:GetObject"
                - "s3:ListBucket"
              Resource: 
                - "arn:aws:s3:::harinathdocs"
                - "arn:aws:s3:::harinathdocs/*"
            - Effect: Allow
              Action:
                - "logs:CreateLogGroup"
                - "logs:CreateLogStream"
                - "logs:PutLogEvents"
              Resource: "arn:aws:logs:*:*:*"

      

  # 2. మ్యాన్యువల్ పర్మిషన్ (Handshake)
  # ఇది S3 బకెట్ కి మీ ల్యాంబ్డాని పిలిచే అధికారాన్ని ఇస్తుంది
  S3InvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref MyLocalFunction
      Principal: s3.amazonaws.com
      SourceArn: "arn:aws:s3:::harinathdocs"

  # 3. డైనమోడీబీ టేబుల్
  MyChatHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MyChatHistoryTable
      AttributeDefinitions:
        - AttributeName: userid
          AttributeType: S
      KeySchema:
        - AttributeName: userid
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true