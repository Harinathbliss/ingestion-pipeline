AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  # 1. ల్యాంబ్డా ఫంక్షన్ డెఫినిషన్
  MyLocalFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      MemorySize: 256
      Timeout: 30
      CodeUri: mylambda/
      
      # ఎన్విరాన్మెంట్ వేరియబుల్స్ (బెస్ట్ ప్రాక్టీస్)
      Environment:
        Variables:
          TABLE_NAME: !Ref MyChatHistoryTable

      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - "bedrock:InvokeModel"
                - "bedrock:InvokeModelWithResponseStream"
              Resource: "*"
            - Effect: Allow
              Action:
                - "dynamodb:PutItem"
                - "dynamodb:GetItem"
                - "dynamodb:Query"
                - "dynamodb:UpdateItem"
              Resource: !GetAtt MyChatHistoryTable.Arn
            - Effect: Allow
              Action:
                - "logs:CreateLogGroup"
                - "logs:CreateLogStream"
                - "logs:PutLogEvents"
              Resource: "arn:aws:logs:*:*:*"

      Events:
        MyApiEvent:
          Type: Api
          Properties:
            Path: /ask
            Method: post

  # 2. డైనమోడీబీ టేబుల్ డెఫినిషన్
  MyChatHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MyChatHistoryTable
      AttributeDefinitions:
        - AttributeName: sessionId # ఇక్కడ పేరు మార్చాను
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId # ఇక్కడ కూడా అదే పేరు ఉండాలి
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true