AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  # 1. ల్యాంబ్డా ఫంక్షన్ డెఫినిషన్
  MyLocalFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      MemorySize: 512
      Timeout: 60
      CodeUri: mylambda/
      
      Environment:
        Variables:
          TABLE_NAME: !Ref MyChatHistoryTable
          SOURCE_BUCKET: !Ref MyDataBucket 

      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - "bedrock:InvokeModel"
                - "bedrock:InvokeModelWithResponseStream"
              Resource: "*"
            - Effect: Allow
              Action:
                - "dynamodb:PutItem"
                - "dynamodb:GetItem"
                - "dynamodb:Query"
                - "dynamodb:UpdateItem"
              Resource: !GetAtt MyChatHistoryTable.Arn
            # S3 Permissions
            - Effect: Allow
              Action:
                - "s3:GetObject"
                - "s3:ListBucket"
              Resource: 
                - !GetAtt MyDataBucket.Arn
                - !Sub "${MyDataBucket.Arn}/*"
            - Effect: Allow
              Action:
                - "logs:CreateLogGroup"
                - "logs:CreateLogStream"
                - "logs:PutLogEvents"
              Resource: "arn:aws:logs:*:*:*"

      Events:
        MyApiEvent:
          Type: Api
          Properties:
            Path: /ask
            Method: post
        # S3 Trigger అప్‌డేట్
        S3UploadTrigger:
          Type: S3
          Properties:
            Bucket: !Ref MyDataBucket
            Events: s3:ObjectCreated:*

  # 2. S3 బకెట్ (పేరు 'docs' గా మార్చాను)
  MyDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: docs # ఇక్కడ మీ బకెట్ పేరు ఇచ్చాను

  # 3. డైనమోడీబీ టేబుల్
  MyChatHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MyChatHistoryTable
      AttributeDefinitions:
        - AttributeName: userid
          AttributeType: S
      KeySchema:
        - AttributeName: userid
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true