AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  MyLocalFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      MemorySize: 256
      Timeout: 30
      CodeUri: mylambda/
      
      # IAM Policies ఇక్కడ యాడ్ చేయబడ్డాయి
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - "bedrock:InvokeModel"
                - "bedrock:InvokeModelWithResponseStream"
              Resource: "*" # భద్రత కోసం మీరు వాడుతున్న మోడల్ ARN ని ఇక్కడ ఇవ్వడం ఉత్తమం
            - Effect: Allow
              Action:
                - "logs:CreateLogGroup"
                - "logs:CreateLogStream"
                - "logs:PutLogEvents"
              Resource: "arn:aws:logs:*:*:*"

      Events:
        MyApiEvent:
          Type: Api
          Properties:
            Path: /ask
            Method: post